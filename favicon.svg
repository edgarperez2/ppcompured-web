<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" fill="#0d1117" rx="5"/>

  <!-- Arco superior azul con nodo -->
  <path d="M 3 19 Q 16 2 29 16"
        fill="none" stroke="#3b82f6" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="29" cy="16" r="1.8" fill="none" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="29" cy="16" r="0.8" fill="#3b82f6"/>

  <!-- Arco inferior gris con nodo -->
  <path d="M 3 21 Q 16 31 29 21"
        fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="3" cy="21" r="1.8" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="3" cy="21" r="0.8" fill="#94a3b8"/>

  <!-- P izquierda blanca -->
  <text x="1" y="26"
        font-family="'Arial Black',Arial,sans-serif"
        font-size="18" font-weight="900" fill="#ffffff">P</text>

  <!-- & central -->
  <text x="13" y="26"
        font-family="'Arial Black',Arial,sans-serif"
        font-size="8" font-weight="700" fill="#e2e8f0">&amp;</text>

  <!-- P derecha azul -->
  <text x="18" y="26"
        font-family="'Arial Black',Arial,sans-serif"
        font-size="18" font-weight="900" fill="#3b82f6">P</text>
</svg>
